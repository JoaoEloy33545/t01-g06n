quarkus.application.name=CSerZkServerOPE

# Podman quorum orchestration
zkquorum.podman.binary=podman
zkquorum.manifest.path=src/main/resources/podman/zk-quorum.yaml
zkquorum.startup.enabled=true
zkquorum.startup.timeout-seconds=90
zkquorum.startup.strict=false
zkquorum.nodes.initial=4
zkquorum.ui.allow-offline-ops=true

# ZooKeeper client
zkquorum.zk.connect=localhost:2181

# Reduce ZooKeeper client log noise when quorum is unavailable
quarkus.log.category."org.apache.zookeeper".level=ERROR
quarkus.log.category."io.undertow.request".level=OFF
quarkus.log.category."io.undertow.request.io".level=OFF
